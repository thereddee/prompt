<!DOCTYPE html>
<html lang="fr">
<head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
    <meta charset="UTF-8">
    <title>Lotus de Fer - Studio de Génération</title>
    <style>
        :root { --bg-main: #121212; --bg-panel: #1e1e1e; --border: #333; --accent: #00d4ff; --text: #e0e0e0; --tag-color: #ff4d4d; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-main); color: var(--text); margin: 0; height: 100vh; display: flex; overflow: hidden; }
        .workspace { flex: 1; display: flex; flex-direction: column; padding: 20px; overflow-y: auto; gap: 20px; }
        .sidebar { width: 350px; background: var(--bg-panel); border-left: 1px solid var(--border); display: flex; flex-direction: column; transition: 0.3s; }
        .sidebar.collapsed { width: 0; border: none; transform: translateX(100%); }
        .top-bar { display: flex; gap: 15px; align-items: center; background: var(--bg-panel); padding: 15px; border-radius: 8px; border: 1px solid var(--border); }
        .input-group { display: flex; flex-direction: column; flex: 1; gap: 5px; }
        .input-group label { font-size: 0.75em; color: #aaa; text-transform: uppercase; }
        .input-group input, .input-group select { background: #111; color: var(--text); border: 1px solid var(--border); padding: 8px; border-radius: 4px; font-family: monospace; }
        .btn-toggle-sidebar { background: var(--accent); color: #000; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .section-title { color: var(--accent); margin: 0 0 10px 0; font-size: 1.1em; text-transform: uppercase; display: flex; justify-content: space-between; }
        .editor-container { position: relative; width: 100%; height: 120px; background: #111; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
        .highlight-layer, #promptResume { position: absolute; top: 0; left: 0; width: 100%; height: 100%; padding: 12px; font-family: 'Consolas', monospace; font-size: 14px; line-height: 1.5; white-space: pre-wrap; word-wrap: break-word; }
        .highlight-layer { color: transparent; z-index: 1; pointer-events: none; }
        #promptResume { background: transparent; color: var(--text); border: none; z-index: 2; resize: none; outline: none; caret-color: white; }
        #promptComplet { width: 100%; height: 150px; background: #0a0a0a; color: #aaa; border: 1px solid var(--border); padding: 12px; font-family: 'Consolas', monospace; border-radius: 4px; resize: none; }
        #variablesContainer { display: flex; flex-direction: column; gap: 10px; background: #2a2510; border: 1px solid #665200; padding: 15px; border-radius: 4px; display: none; }
        .var-row { display: flex; align-items: center; gap: 10px; margin-bottom: 5px; }
        .var-row label { font-family: monospace; color: #ffcc00; width: 120px; }
        .var-row input { flex: 1; background: #111; color: white; border: 1px solid #555; padding: 5px; }
        .result-area { flex: 1; border: 2px dashed var(--border); border-radius: 8px; display: flex; justify-content: center; align-items: center; background: #0a0a0a; min-height: 250px; position: relative; }
        .btn-generate { position: absolute; bottom: 20px; right: 20px; background: var(--tag-color); color: white; border: none; padding: 12px 24px; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .sidebar-header { padding: 15px; background: #111; border-bottom: 1px solid var(--border); color: var(--accent); font-weight: bold; }
        .sidebar-content { flex: 1; overflow-y: auto; padding: 10px; }
        details { margin-bottom: 8px; background: #252525; border: 1px solid var(--border); border-radius: 4px; }
        summary { padding: 10px; cursor: pointer; font-weight: bold; }
        .details-content { padding: 10px; display: flex; flex-direction: column; gap: 5px; }
        .trigger-btn { background: #1a1a1a; border: 1px solid #444; color: var(--text); padding: 8px; border-radius: 4px; text-align: left; cursor: pointer; font-family: monospace; display: flex; flex-direction: column; }
        .trigger-btn strong { color: var(--accent); }
        .trigger-btn small { color: #888; font-size: 0.8em; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="workspace">
    <div class="top-bar">
        <div class="input-group">
            <label>Fichier YAML</label>
            <input type="text" id="ymlPath" value="default.yml" onchange="window.manualLoad()">
        </div>
        <div class="input-group">
            <label for="modelSelect" style="color:var(--accent); font-size:12px; font-weight:bold;">MODÈLE IA (COÛT/IMG)</label>
            <select id="modelSelect">
                <optgroup label="Économie (Tests & Brouillons)">
                    <option value="gemini-2.5-flash-image">Nano Banana (2.5 Flash) — (~0.04$)</option>
                    <option value="imagen-4.0-fast-generate-001">Imagen 4 Fast — (Bas coût)</option>
                    <option value="gemini-3.1-flash-image-preview" selected>Nano Banana 2 (3.1 Flash) — (~0.07$)</option>
                </optgroup>

                <optgroup label="Qualité (Rendus Final Boss)">
                    <option value="imagen-4.0-generate-001">Imagen 4 Standard — (Medium)</option>
                    <option value="gemini-3-pro-image-preview">Nano Banana Pro (3.0 Pro) — (~0.13$)</option>
                    <option value="imagen-4.0-ultra-generate-001">Imagen 4 Ultra — (Premium)</option>
                </optgroup>

                <optgroup label="Vidéos (Veo)">
                    <option value="veo-3.1-fast-generate-preview">Veo 3.1 Fast (Vidéo Preview)</option>
                </optgroup>
            </select>
        </div>
        <div class="input-group">
            <label>Ratio</label>
            <select id="aspectRatioSelect">
                <option value="1:1">1:1</option>
                <option value="16:9">16:9</option>
                <option value="3:4">3:4</option>
            </select>
        </div>
        <div class="input-group">
            <label>Clé API</label>
            <input type="password" id="apiKey" placeholder="sk-..." oninput="window.saveApiKey(this.value)">
        </div>
        <button class="btn-toggle-sidebar" onclick="window.toggleSidebar()">☰ Menu</button>
    </div>

    <div>
        <h3 class="section-title">Prompt Résumé</h3>
        <div class="editor-container">
            <div id="highlightLayer" class="highlight-layer"></div>
            <textarea id="promptResume" placeholder="Tappe tes tags ici..." oninput="window.processPrompt()"></textarea>
        </div>
    </div>

    <div id="variablesContainer">
        <h3 class="section-title" style="color: #ffcc00;">Variables</h3>
        <div id="variablesList"></div>
    </div>

    <div>
        <h3 class="section-title">Prompt Complet</h3>
        <textarea id="promptComplet" readonly></textarea>
        <button onclick="window.copyPrompt()" style="margin-top:5px; background:var(--accent); color:black; border:none; padding:5px 10px; border-radius:4px; cursor:pointer; font-weight:bold;">Copier</button>
    </div>

    <div class="result-area" id="resultArea">
        <div class="result-placeholder">Zone de Rendu</div>
        <button class="btn-generate" onclick="window.generateImage()">Générer ✨</button>
    </div>
    
    <button class="btn-menu" style="background:var(--accent); color:#000; font-weight:bold;" onclick="window.generateImage()">Générer ✨</button>

    <button onclick="window.checkModels()" style="background:#333; color:#888; border:none; padding:5px; font-size:10px; cursor:pointer;">Debug: Lister Modèles</button>
</div>

<div class="sidebar" id="sidebar">
    <div class="sidebar-header">Bibliothèque</div>
    <details id="refGallery" open>
        <summary style="border-left: 4px solid #ffcc00;">🖼️ RÉFÉRENCES VISUELLES</summary>
        <div class="details-content">
            <div id="selectedRefDisplay" style="margin-bottom:10px; text-align:center; display:none;">
                <p style="font-size:10px; color:#aaa;">Référence active :</p>
                <img id="refPreview" src="" style="width:80px; height:80px; object-fit:cover; border:2px solid var(--accent); border-radius:4px;">
                <button onclick="window.clearReference()" style="display:block; margin:5px auto; font-size:10px; background:none; border:none; color:red; cursor:pointer;">[Retirer]</button>
            </div>
            <input type="file" id="localRefInput" style="display:none;" accept="image/*" onchange="window.handleLocalRef(this)">
            <button class="trigger-btn" onclick="document.getElementById('localRefInput').click()">
                <strong>+ Upload local</strong>
                <small>Utiliser une image de ton PC</small>
            </button>
            <div id="yamlRefList"></div> </div>
    </details>
    <div class="sidebar-content" id="sidebarContent"></div>
</div>

<script type="module">
    // --- VARIABLES GLOBALES ---
    let promptDb = {};
    let currentVariables = {};
    let lastRenderedVars = "";
    const colorPalette = ['#00d4ff', '#ffcc00', '#bf80ff', '#00ffcc', '#ff9933', '#ff4d4d'];

    // --- LOGIQUE YAML & UI ---
    async function loadYaml(fileName = 'default.yml') {
        const root = document.getElementById('sidebarContent');
        if (root) root.innerHTML = '<p style="text-align:center;color:#888;">Sync... 🔄</p>';
        try {
            const res = await fetch(`${fileName}?t=${new Date().getTime()}`);
            if (!res.ok) throw new Error(`Fichier introuvable (${res.status})`);
            const text = await res.text();
            parseYaml(text);
        } catch (e) {
            if (root) root.innerHTML = `<p style="color:red;padding:10px;">Erreur YAML</p>`;
        }
    }

    // --- Refactorer YAML parsing avec js-yaml ---
    function parseYaml(content) {
        const root = document.getElementById('sidebarContent');
        root.innerHTML = '';
        
        // On efface les données précédentes
        promptDb = {};

        try {
            // On utilise jsyaml pour parser tout le bloc de texte
            const data = jsyaml.load(content);
            
            let catIdx = 0;
            
            // data est maintenant un objet structuré. Exemple: { category: [ {trigger: "", replace: ""}, ... ] }
            for (const category in data) {
                // Création de l'élément d'accordéon pour la catégorie
                const currentDetails = document.createElement('details');
                const summary = document.createElement('summary');
                summary.textContent = category;
                summary.style.borderLeft = `4px solid ${colorPalette[catIdx % 6]}`;
                const contentDiv = document.createElement('div');
                contentDiv.className = 'details-content';
                currentDetails.append(summary, contentDiv);
                root.appendChild(currentDetails);
                
                // Itération sur les triggers à l'intérieur de cette catégorie
                data[category].forEach(item => {
                    const trigger = item.trigger;
                    const replace = item.replace;
                    const imgPath = item.image; // Nouvelle propriété 'image' pour tes character sheets !
                    
                    if (trigger && replace) {
                        promptDb[trigger] = { text: replace, color: colorPalette[catIdx % 6], image: imgPath };
                        const btn = document.createElement('button');
                        btn.className = 'trigger-btn';
                        
                        // Création du contenu visuel pour le bouton
                        let contentHtml = '';
                        if (imgPath) {
                            contentHtml = `
                                <div style="display:flex;align-items:center;">
                                    <img src="${imgPath}" style="width:40px;height:40px;object-fit:cover;border-radius:4px;margin-right:8px;">
                                    <div style="flex:1;">
                                        <strong style="color:${promptDb[trigger].color};">${trigger}</strong>
                                        <small>${replace}</small>
                                    </div>
                                </div>
                            `;
                        } else {
                            contentHtml = `
                                <strong style="color:${promptDb[trigger].color};">${trigger}</strong>
                                <small>${replace}</small>
                            `;
                        }
                        
                        btn.innerHTML = contentHtml;
                        btn.onclick = () => window.insertTag(trigger);
                        contentDiv.appendChild(btn);
                    }
                });
                
                catIdx++;
            }
            
        } catch (e) {
            console.error("Erreur parsing YAML:", e);
            root.innerHTML = `<p style="color:#ff4d4d;padding:10px;text-align:center;">❌ Erreur lors du parsing du fichier YAML. Vérifie sa syntaxe.<br><span style="font-size:10px;color:#aaa;">Détails console: ${e.message}</span></p>`;
        }
    }

    function processPrompt() {
        const text = document.getElementById('promptResume').value;
        const layer = document.getElementById('highlightLayer');
        if(!layer) return;
        
        layer.innerHTML = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
            .replace(/(:\w[\w-]*)/g, m => promptDb[m] ? `<span style="background:${promptDb[m].color}40;border-radius:2px;color:${promptDb[m].color}">${m}</span>` : m)
            .replace(/\n/g, '<br>') + (text.endsWith('\n') ? ' ' : '');

        let full = text;
        (text.match(/(:\w[\w-]*)/g) || []).forEach(t => {
            if (promptDb[t]) full = full.replace(t, promptDb[t].text.replace(/\[Use.*?\]\s*/gi, '').trim());
        });

        const vRegex = /{{(.*?)}}/g;
        let vFound = new Set(), m;
        while ((m = vRegex.exec(full)) !== null) vFound.add(m[1]);
        
        renderVars(vFound);
        
        let final = full;
        vFound.forEach(v => {
            final = final.replace(new RegExp(`{{${v}}}`, 'g'), currentVariables[v] || `[${v}]`);
        });
        const out = document.getElementById('promptComplet');
        if (out) out.value = final;
    }

    function renderVars(vSet) {
        const sig = Array.from(vSet).sort().join(',');
        if (lastRenderedVars === sig) return;
        lastRenderedVars = sig;
        const cont = document.getElementById('variablesContainer');
        const list = document.getElementById('variablesList');
        if (!cont || !list) return;
        if (vSet.size === 0) { cont.style.display = 'none'; return; }
        cont.style.display = 'flex';
        list.innerHTML = '';
        vSet.forEach(v => {
            if (currentVariables[v] === undefined) currentVariables[v] = '';
            const d = document.createElement('div');
            d.className = 'var-row';
            d.innerHTML = `<label>${v}</label><input type="text" value="${currentVariables[v]}" oninput="window.updateVar('${v}', this.value)">`;
            list.appendChild(d);
        });
    }

    // --- GÉNÉRATION BLINDÉE ---


let currentReferenceBase64 = null;

// Gérer l'upload local
window.handleLocalRef = async (input) => {
    if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = (e) => {
            currentReferenceBase64 = e.target.result.split(',')[1];
            document.getElementById('refPreview').src = e.target.result;
            document.getElementById('selectedRefDisplay').style.display = 'block';
        };
        reader.readAsDataURL(input.files[0]);
    }
};

window.clearReference = () => {
    currentReferenceBase64 = null;
    document.getElementById('selectedRefDisplay').style.display = 'none';
};

// --- FONCTION GÉNÉRER MISE À JOUR ---
    async function generateImage() {
        const key = document.getElementById('apiKey').value.trim();
        const prompt = document.getElementById('promptComplet').value.trim();
        const model = document.getElementById('modelSelect').value;
        const ratio = document.getElementById('aspectRatioSelect').value;
        const area = document.getElementById('resultArea');

        if (!key || !prompt) return alert("Clé ou Prompt manquant !");
        area.innerHTML = `<div style="color:var(--accent);animation:pulse 1s infinite">Génération multimodale... 🚀</div>`;

        try {
            const isImagen = model.includes('imagen') || model.includes('image');
            const method = isImagen ? 'predict' : 'generateContent';
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:${method}?key=${key}`;

            // Construction du payload avec image de référence si disponible
            let payload;
            if (isImagen) {
                payload = {
                    instances: [{
                        prompt: prompt,
                        // Si on a une image de référence, on l'ajoute
                        image: currentReferenceBase64 ? { bytesBase64Encoded: currentReferenceBase64 } : undefined
                    }],
                    parameters: { sampleCount: 1, aspectRatio: ratio }
                };
            } else {
                // Mode Gemini Multimodal
                const parts = [{ text: prompt }];
                if (currentReferenceBase64) {
                    parts.push({ inline_data: { mime_type: "image/png", data: currentReferenceBase64 } });
                }
                payload = { contents: [{ parts: parts }] };
            }

            const res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const data = await res.json();
            if (!res.ok) throw new Error(data.error?.message || "Erreur API");

            const b64 = data.predictions?.[0]?.bytesBase64Encoded || 
                        data.predictions?.[0]?.bytesBase64 || 
                        data.generatedImages?.[0]?.image?.imageBytes;

            if (b64) {
                // On récupère aussi le mimeType si présent, sinon on assume png
                const mime = data.predictions?.[0]?.mimeType || "image/png";
                
                area.innerHTML = `
                    <div style="display:flex; flex-direction:column; align-items:center; height:100%; width:100%;">
                        <img src="data:${mime};base64,${b64}" style="max-width:100%; max-height:85%; border-radius:8px; border:1px solid var(--accent); box-shadow: 0 0 25px rgba(0,212,255,0.4);">
                        <div style="margin-top:10px; display:flex; gap:10px;">
                            <button class="btn-generate" onclick="window.generateImage()" style="position:static;">Regénérer ✨</button>
                            <button id="btnNewImage" onclick="window.newGeneration()" style="position:static; background:#444; color:white; padding:8px 12px; border-radius:4px; border:none; font-weight:bold; font-size:12px; cursor:pointer;">Nouvelle Image ➕</button>
                            <a href="data:${mime};base64,${b64}" download="lotus-render.png" style="background:#333; color:white; padding:8px 12px; border-radius:4px; text-decoration:none; font-weight:bold; font-size:12px;">Sauvegarder 💾</a>
                        </div>
                    </div>`;
            } else {
                area.innerHTML = `<div style="color:#aaa;padding:20px;">Image générée, mais format non reconnu.
                        <div style="margin-top:10px; display:flex; gap:10px;">
                            <button class="btn-generate" onclick="window.generateImage()" style="position:static;">Regénérer ✨</button>
                            <button id="btnNewImage" onclick="window.newGeneration()" style="position:static; background:#444; color:white; padding:8px 12px; border-radius:4px; border:none; font-weight:bold; font-size:12px; cursor:pointer;">Nouvelle Image ➕</button>
                            <a href="data:${mime};base64,${b64}" download="lotus-render.png" style="background:#333; color:white; padding:8px 12px; border-radius:4px; text-decoration:none; font-weight:bold; font-size:12px;">Sauvegarder 💾</a>
                        </div>
                    </div>`;
            }
        } catch (e) {
            area.innerHTML = `<div style="color:red;padding:15px;background:#2b0000;font-size:11px;">${e.message}</div>`;
        }
    }

// Fonction utilitaire pour convertir tes fichiers locaux en Base64
async function getBase64FromUrl(url) {
    const data = await fetch(url);
    const blob = await data.blob();
    return new Promise((resolve) => {
        const reader = new FileReader();
        reader.readAsDataURL(blob);
        reader.onloadend = () => {
            const base64data = reader.result.split(',')[1];
            resolve(base64data);
        };
    });
}


// --- FONCTION POUR DEBUG: LISTER MODÈLES (FIX) ---
window.debugListModels = async () => {
    const key = document.getElementById('apiKey').value.trim();
    if (!key) {
        alert("Richard, s'il te plaît, entre ta clé API d'abord !");
        return;
    }

    try {
        const url = `https://generativelanguage.googleapis.com/v1beta/models?key=${key}`;
        const response = await fetch(url);
        
        if (!response.ok) {
            throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        }

        const data = await response.json();
        
        // On crée un modal pour afficher ça proprement
        let modalHtml = `
            <div id="modelListModal" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:2000;display:flex;justify-content:center;align-items:center;">
                <div style="background:#222;padding:20px;border-radius:8px;max-width:80%;max-height:80%;overflow:auto;color:#eee;">
                    <div style="display:flex;justify-content:space-between;margin-bottom:15px;">
                        <h2 style="margin:0;">Modèles Disponibles (v1beta)</h2>
                        <button onclick="document.getElementById('modelListModal').remove()" style="background:#555;color:#fff;border:none;padding:5px 10px;cursor:pointer;">Fermer [X]</button>
                    </div>
                    <table style="width:100%;border-collapse:collapse;font-size:12px;">
                        <tr style="border-bottom:2px solid #555;">
                            <th style="text-align:left;padding:5px;">Nom / ID</th>
                            <th style="text-align:left;padding:5px;">Affichage</th>
                            <th style="text-align:left;padding:5px;">Description</th>
                            <th style="text-align:right;padding:5px;">Input tokens</th>
                            <th style="text-align:right;padding:5px;">Output tokens</th>
                        </tr>
        `;

        data.models.forEach(model => {
            modalHtml += `
                        <tr style="border-bottom:1px solid #333;">
                            <td style="padding:5px;font-family:monospace;">${model.name.replace('models/', '')}</td>
                            <td style="padding:5px;">${model.displayName}</td>
                            <td style="padding:5px;">${model.description || ''}</td>
                            <td style="padding:5px;text-align:right;">${model.inputTokenLimit || ''}</td>
                            <td style="padding:5px;text-align:right;">${model.outputTokenLimit || ''}</td>
                        </tr>
            `;
        });

        modalHtml += `
                    </table>
                </div>
            </div>
        `;

        document.body.insertAdjacentHTML('beforeend', modalHtml);

    } catch (e) {
        alert(`Erreur lors de la récupération des modèles: ${e.message}`);
        console.error("Détails IT:", e);
    }
};

    // --- FONCTION POUR PEUPLER LE SÉLECTEUR DE MODÈLES DYNAMIQUEMENT ---
    async function populateModelSelector() {
        const key = document.getElementById('apiKey').value.trim();
        if (!key) return; // On a besoin d'une clé

        try {
            const url = `https://generativelanguage.googleapis.com/v1beta/models?key=${key}`;
            const response = await fetch(url);
            const data = await response.json();
            
            const select = document.getElementById('modelSelect');
            select.innerHTML = ''; // On efface les valeurs en dur

            // On crée deux groupes pour trier un peu
            const groupText = document.createElement('optgroup');
            groupText.label = "Texte & Multimodal";
            const groupImage = document.createElement('optgroup');
            groupImage.label = "Génération d'Image (Visual/Imagen)";
            
            data.models.forEach(m => {
                const opt = document.createElement('option');
                opt.value = m.name.replace('models/', '');
                opt.textContent = `${m.displayName} [${opt.value}]`;
                
                // Détection simple du type de modèle pour le classer
                if (m.name.includes('image')) {
                    groupImage.appendChild(opt);
                } else {
                    groupText.appendChild(opt);
                }
            });
            
            if (groupText.children.length > 0) select.appendChild(groupText);
            if (groupImage.children.length > 0) select.appendChild(groupImage);
            
            // Sélection par défaut (par exemple, Nano Banana 2 si présent)
            const defaultModel = "gemini-3.1-flash-image-preview";
            for (let i = 0; i < select.options.length; i++) {
                if (select.options[i].value === defaultModel) {
                    select.selectedIndex = i;
                    break;
                }
            }
            
            console.log("Modèles chargés dynamiquement dans le sélecteur.");

        } catch (e) {
            console.error("Erreur lors de la population du sélecteur de modèles:", e);
            // Fallback ou on laisse vide
        }
    }

     
    // --- EXPORTS & INIT ---
    window.insertTag = (t) => {
        const a = document.getElementById('promptResume');
        if(a) {
            a.value += (a.value.endsWith(' ') || a.value === '' ? '' : ' ') + t + ' ';
            processPrompt();
        }
    };
    window.processPrompt = processPrompt;
    window.updateVar = (n, v) => { currentVariables[n] = v; processPrompt(); };
    window.copyPrompt = () => {
        const c = document.getElementById('promptComplet');
        if(c) { c.select(); document.execCommand('copy'); alert("Copié !"); }
    };
    window.toggleSidebar = () => document.getElementById('sidebar').classList.toggle('collapsed');
    window.saveApiKey = (v) => localStorage.setItem('gemini_api_key', v);
    window.manualLoad = () => loadYaml(document.getElementById('ymlPath').value);
    window.generateImage = generateImage;
    window.checkModels = async () => {
        const k = document.getElementById('apiKey').value;
        try {
            const r = await fetch(`https://generativelanguage.googleapis.com/v1/models?key=${k}`);
            const d = await r.json();
            console.log("Modèles dispos:", d.models);
            alert("Liste reçue. Regarde la console (F12).");
        } catch(e) { alert("Erreur scan: " + e.message); }
    };
    // Fonction pour réinitialiser la zone d'image et le focus
    window.newGeneration = () => {
        // 1. Efface la zone d'image
        document.getElementById('resultArea').innerHTML = `<div style="color:#aaa;padding:20px;text-align:center;">L'image générée s'affichera ici...</div>`;
        
        // 2. Ramène le focus sur le champ de saisie du prompt pour en écrire un autre
        document.getElementById('promptResume').focus();
        // document.getElementById('promptResume').select(); // Optionnel: sélectionne tout le texte
    };


window.onload = () => {
        loadYaml();
        const k = localStorage.getItem('gemini_api_key');
        if (k) {
            document.getElementById('apiKey').value = k;
            // NOUVEAU : On charge les modèles si on a une clé
            populateModelSelector(); 
        }
        const pr = document.getElementById('promptResume');
        const hl = document.getElementById('highlightLayer');
        pr.addEventListener('scroll', () => hl.scrollTop = pr.scrollTop);
    };
</script>

</body>
</html>
