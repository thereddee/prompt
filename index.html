<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Lotus de Fer - Prompt Editor</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a1a; color: #e0e0e0; padding: 15px; padding-bottom: 220px; }
        .container { max-width: 1000px; margin: auto; }
        
        h1 { color: #ff4d4d; border-bottom: 2px solid #ff4d4d; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .status { font-size: 0.4em; padding: 5px 10px; border-radius: 4px; text-transform: uppercase; }
        .status.online { background: #2ecc71; color: #fff; }
        .status.error { background: #e74c3c; color: #fff; }

        .config-bar { background: #252525; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #444; display: flex; align-items: center; gap: 10px; }
        .config-bar input { background: #111; border: 1px solid #555; color: #fff; padding: 8px; border-radius: 4px; flex-grow: 1; font-family: monospace; }
        .btn-load { background: #ffcc00; color: #000; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }

        h2 { color: #00d4ff; border-left: 4px solid #00d4ff; padding-left: 15px; margin-top: 40px; text-transform: uppercase; font-size: 1.1em; }
        
        .section { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; margin-top: 15px; }
        
        .item { background: #2d2d2d; padding: 15px; border-radius: 6px; cursor: pointer; border: 1px solid #444; transition: 0.2s; position: relative; display: flex; flex-direction: column; }
        .item:hover { border-color: #00d4ff; background: #363636; }
        .item input { position: absolute; right: 15px; top: 15px; scale: 1.5; cursor: pointer; }
        
        .trigger-label { color: #ffcc00; font-weight: bold; display: block; margin-bottom: 6px; font-family: monospace; font-size: 1.1em; }
        .preview-text { color: #aaa; font-size: 0.85em; line-height: 1.3; display: block; padding-right: 25px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        #output-container { position: fixed; bottom: 0; left: 0; right: 0; background: #222; padding: 20px; border-top: 3px solid #00d4ff; box-shadow: 0 -10px 30px rgba(0,0,0,0.7); z-index: 100; }
        .output-wrapper { max-width: 1000px; margin: auto; }
        textarea { width: 100%; height: 100px; background: #111; color: #00ffcc; border: 1px solid #444; padding: 12px; font-family: monospace; resize: none; border-radius: 4px; box-sizing: border-box; line-height: 1.4; }
        
        .controls { display: flex; gap: 10px; margin-top: 10px; }
        .btn { flex: 1; padding: 12px; border: none; cursor: pointer; font-weight: bold; border-radius: 4px; text-transform: uppercase; }
        .btn-copy { background: #00d4ff; color: #000; }
        .btn-clear { background: #444; color: #fff; }
        .btn:active { transform: scale(0.98); }
        
        /* Style pour la boîte d'erreur */
        .error-box { background: #331414; border: 2px dashed #ff4d4d; padding: 20px; border-radius: 8px; margin-top: 20px; }
        .error-box h2 { color: #ff4d4d; margin-top: 0; border: none; padding: 0; }
        .error-box h3 { color: #ffcc00; margin-top: 20px; }
        .error-box ul, .error-box ol { line-height: 1.6; font-size: 1.1em; }
    </style>
</head>
<body>

<div class="container">
    <h1>
        Lotus de Fer 
        <span id="loadStatus" class="status">Sync...</span>
    </h1>

    <div class="config-bar">
        <span>Fichier YAML :</span>
        <input type="text" id="fileNameInput" value="default.yml" placeholder="nom-du-fichier.yml">
        <button class="btn-load" onclick="manualLoad()">Charger</button>
    </div>
    
    <div id="dynamic-content">
        </div>
</div>

<div id="output-container">
    <div class="output-wrapper">
        <textarea id="promptOutput" readonly placeholder="Coche des éléments pour bâtir ton prompt..."></textarea>
        <div class="controls">
            <button class="btn btn-clear" onclick="clearAll()">Effacer</button>
            <button class="btn btn-copy" onclick="copyPrompt()">Copier le prompt</button>
        </div>
    </div>
</div>

<script>
    async function loadYaml(fileName) {
        const statusEl = document.getElementById('loadStatus');
        statusEl.textContent = "Sync...";
        statusEl.className = "status";

        try {
            const response = await fetch(`${fileName}?t=${new Date().getTime()}`);
            if (!response.ok) throw new Error();
            const content = await response.text();
            renderContent(content);
            statusEl.textContent = "Connecté : " + fileName;
            statusEl.className = "status online";
        } catch (err) {
            statusEl.textContent = "Erreur : " + fileName;
            statusEl.className = "status error";
            
            // Le panneau d'instructions clair qui te dit quoi faire
            document.getElementById('dynamic-content').innerHTML = `
                <div class="error-box">
                    <h2>⚠️ Oups ! Fichier introuvable</h2>
                    <p style="font-size: 1.1em;">Le script a cherché partout, mais il ne trouve pas le fichier <strong>${fileName}</strong>.</p>
                    
                    <h3>Fichiers requis sur ton GitHub :</h3>
                    <ul>
                        <li>Ton éditeur web : <code>index.html</code></li>
                        <li>Tes données Espanso : <code>${fileName}</code></li>
                    </ul>
                    
                    <h3>Check-list rapide :</h3>
                    <ol>
                        <li>Assure-toi que <strong>${fileName}</strong> est bien uploadé à la racine de ton repo.</li>
                        <li>Vérifie les majuscules et minuscules (ex: <em>Default.yml</em> va planter si tu cherches <em>default.yml</em>).</li>
                        <li>Si tu viens juste de l'uploader, attends 1 ou 2 minutes pour que la cache de GitHub Pages se mette à jour, puis rafraîchis la page.</li>
                    </ol>
                </div>
            `;
        }
    }

    function manualLoad() {
        const fileName = document.getElementById('fileNameInput').value.trim();
        if (fileName) {
            clearAll();
            loadYaml(fileName);
        }
    }

    function renderContent(content) {
        const root = document.getElementById('dynamic-content');
        root.innerHTML = '';

        const lines = content.split('\n');
        let currentWrapper = null;
        const matchRegex = /^\s*-\s*trigger:\s*["']?(:[\w-]+)["']?\s*replace:\s*(?:["']?([\s\S]*?)["']?(?=\n\s*-|\n\s*vars:|\n\s*#|$)|\|([\s\S]*?)(?=\n\s*-|\n\s*vars:|\n\s*#|$))/;

        lines.forEach((line, index) => {
            if (line.trim().startsWith('###')) {
                const categoryName = line.replace('###', '').trim();
                const h2 = document.createElement('h2');
                h2.textContent = categoryName;
                root.appendChild(h2);
                
                currentWrapper = document.createElement('div');
                currentWrapper.className = 'section';
                root.appendChild(currentWrapper);
                return;
            }

            if (!currentWrapper) {
                currentWrapper = document.createElement('div');
                currentWrapper.className = 'section';
                root.appendChild(currentWrapper);
            }

            const segment = lines.slice(index, index + 10).join('\n');
            const match = segment.match(matchRegex);

            if (match && line.trim().startsWith('- trigger:')) {
                const trigger = match[1];
                let replace = (match[2] || match[3] || "").trim();
                if ([':espanso', ':txt', ':date', ':shell'].includes(trigger)) return;

                const div = document.createElement('div');
                div.className = 'item';
                div.onclick = (e) => {
                    if(e.target.tagName !== 'INPUT') {
                        const cb = div.querySelector('input');
                        cb.checked = !cb.checked;
                        updatePrompt();
                    }
                };
                div.innerHTML = `
                    <span class="trigger-label">${trigger}</span>
                    <span class="preview-text">${replace}</span>
                    <input type="checkbox" value="${replace}" onchange="updatePrompt()">
                `;
                currentWrapper.appendChild(div);
            }
        });
    }

    function updatePrompt() {
        const checkboxes = document.querySelectorAll('input[type="checkbox"]:checked');
        const prompt = Array.from(checkboxes).map(cb => cb.value).join('\n\n');
        document.getElementById('promptOutput').value = prompt;
    }

    function copyPrompt() {
        const text = document.getElementById('promptOutput');
        if (!text.value) return;
        text.select();
        document.execCommand('copy');
        const btn = document.querySelector('.btn-copy');
        btn.textContent = "Copié !";
        setTimeout(() => btn.textContent = "Copier le prompt", 2000);
    }

    function clearAll() {
        document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
        updatePrompt();
    }

    window.onload = () => loadYaml('default.yml');
</script>

</body>
</html>
