<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Studio de Génération V0.1</title>
    <style>
        :root { --bg-main: #121212; --bg-panel: #1e1e1e; --border: #333; --accent: #00d4ff; --text: #e0e0e0; --tag-color: #ff4d4d; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-main); color: var(--text); margin: 0; height: 100vh; display: flex; overflow: hidden; }
        .workspace { flex: 1; display: flex; flex-direction: column; padding: 20px; overflow-y: auto; gap: 20px; }
        .sidebar { width: 350px; background: var(--bg-panel); border-left: 1px solid var(--border); display: flex; flex-direction: column; transition: 0.3s; }
        .sidebar.collapsed { width: 0; border: none; transform: translateX(100%); }
        .top-bar { display: flex; gap: 15px; align-items: center; background: var(--bg-panel); padding: 15px; border-radius: 8px; border: 1px solid var(--border); }
        .input-group { display: flex; flex-direction: column; flex: 1; gap: 5px; }
        .input-group label { font-size: 0.75em; color: #aaa; text-transform: uppercase; }
        .input-group input, .input-group select { background: #111; color: var(--text); border: 1px solid var(--border); padding: 8px; border-radius: 4px; font-family: monospace; }
        .btn-toggle-sidebar { background: var(--accent); color: #000; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .section-title { color: var(--accent); margin: 0 0 10px 0; font-size: 1.1em; text-transform: uppercase; display: flex; justify-content: space-between; }
        .editor-container { position: relative; width: 100%; height: 120px; background: #111; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
        .highlight-layer, #promptResume { position: absolute; top: 0; left: 0; width: 100%; height: 100%; padding: 12px; font-family: 'Consolas', monospace; font-size: 14px; line-height: 1.5; white-space: pre-wrap; word-wrap: break-word; }
        .highlight-layer { color: transparent; z-index: 1; pointer-events: none; }
        #promptResume { background: transparent; color: var(--text); border: none; z-index: 2; resize: none; outline: none; caret-color: white; }
        #promptComplet { width: 100%; height: 150px; background: #0a0a0a; color: #aaa; border: 1px solid var(--border); padding: 12px; font-family: 'Consolas', monospace; border-radius: 4px; resize: none; }
        #variablesContainer { display: flex; flex-direction: column; gap: 10px; background: #2a2510; border: 1px solid #665200; padding: 15px; border-radius: 4px; display: none; }
        .var-row { display: flex; align-items: center; gap: 10px; margin-bottom: 5px; }
        .var-row label { font-family: monospace; color: #ffcc00; width: 120px; }
        .var-row input { flex: 1; background: #111; color: white; border: 1px solid #555; padding: 5px; }
        .result-area { flex: 1; border: 2px dashed var(--border); border-radius: 8px; display: flex; justify-content: center; align-items: center; background: #0a0a0a; min-height: 250px; position: relative; }
        .btn-generate { position: absolute; bottom: 20px; right: 20px; background: var(--tag-color); color: white; border: none; padding: 12px 24px; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .sidebar-header { padding: 15px; background: #111; border-bottom: 1px solid var(--border); color: var(--accent); font-weight: bold; }
        .sidebar-content { flex: 1; overflow-y: auto; padding: 10px; }
        details { margin-bottom: 8px; background: #252525; border: 1px solid var(--border); border-radius: 4px; }
        summary { padding: 10px; cursor: pointer; font-weight: bold; }
        .details-content { padding: 10px; display: flex; flex-direction: column; gap: 5px; }
        .trigger-btn { background: #1a1a1a; border: 1px solid #444; color: var(--text); padding: 8px; border-radius: 4px; text-align: left; cursor: pointer; font-family: monospace; display: flex; flex-direction: column; }
        .trigger-btn strong { color: var(--accent); }
        .trigger-btn small { color: #888; font-size: 0.8em; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        /* --- STYLES GALERIE D'HISTORIQUE --- */
        #historyContainer {
            margin-top: 10px;
            background: rgba(0,0,0,0.5);
            border: 1px solid #222;
            border-radius: 8px;
            padding: 10px;
            display: none; /* Cache par défaut */
        }
        #historyContainer h4 {
            color: #888;
            font-size: 11px;
            margin: 0 0 8px 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        #historyStrip {
            display: flex;
            gap: 10px;
            overflow-x: auto; /* Scroll horizontal si beaucoup d'images */
            padding-bottom: 5px;
        }
        /* Scrollbar stylisée */
        #historyStrip::-webkit-scrollbar { height: 6px; }
        #historyStrip::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

        .history-thumb-wrapper {
            position: relative;
            flex-shrink: 0;
            width: 80px;
            height: 80px;
            cursor: pointer;
            border-radius: 4px;
            border: 2px solid transparent;
            transition: all 0.2s ease;
        }
        .history-thumb-wrapper:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
        }
        .history-thumb-wrapper.active {
            border-color: var(--accent);
            box-shadow: 0 0 10px var(--accent);
        }
        .history-thumb {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 2px;
        }
        /* Numéro de l'image sur le thumbnail */
        .history-number {
            position: absolute;
            bottom: 2px;
            right: 2px;
            background: rgba(0,0,0,0.7);
            color: var(--accent);
            font-size: 10px;
            font-weight: bold;
            padding: 2px 4px;
            border-radius: 2px;
            font-family: monospace;
        }


    </style>
</head>
<body>

<div class="workspace">
    <div class="top-bar">
        <div class="input-group">
            <label>Fichier YAML</label>
            <input type="text" id="ymlPath" value="default.yml" onchange="window.manualLoad()">
        </div>
        <div class="input-group">
            <label for="modelSelect" style="color:var(--accent); font-size:12px; font-weight:bold;">MODÈLE IA (COÛT/IMG)</label>
            <select id="modelSelect">
                <optgroup label="Économie (Tests & Brouillons)">
                    <option value="gemini-2.5-flash-image">Nano Banana (2.5 Flash) — (~0.04$)</option>
                    <option value="imagen-4.0-fast-generate-001">Imagen 4 Fast — (Bas coût)</option>
                    <option value="gemini-3.1-flash-image-preview" selected>Nano Banana 2 (3.1 Flash) — (~0.07$)</option>
                </optgroup>

                <optgroup label="Qualité (Rendus Final Boss)">
                    <option value="imagen-4.0-generate-001">Imagen 4 Standard — (Medium)</option>
                    <option value="gemini-3-pro-image-preview">Nano Banana Pro (3.0 Pro) — (~0.13$)</option>
                    <option value="imagen-4.0-ultra-generate-001">Imagen 4 Ultra — (Premium)</option>
                </optgroup>
            </select>
        </div>
        <div class="input-group">
            <label>Ratio</label>
            <select id="aspectRatioSelect">
                <option value="1:1">1:1</option>
                <option value="16:9">16:9</option>
                <option value="3:4">3:4</option>
            </select>
        </div>
        <div class="input-group">
            <label>Clé API</label>
            <input type="password" id="apiKey" placeholder="sk-..." oninput="window.saveApiKey(this.value)">
        </div>
        <button class="btn-toggle-sidebar" onclick="window.toggleSidebar()">☰ Menu</button>
    </div>

    <div>
        <h3 class="section-title">Prompt Résumé</h3>
        <div class="editor-container">
            <div id="highlightLayer" class="highlight-layer"></div>
            <textarea id="promptResume" placeholder="Tappe tes tags ici..." oninput="window.processPrompt()"></textarea>
        </div>
    </div>

    <div id="variablesContainer">
        <h3 class="section-title" style="color: #ffcc00;">Variables</h3>
        <div id="variablesList"></div>
    </div>

    <div>
        <h3 class="section-title">Prompt Complet</h3>
        <textarea id="promptComplet" readonly></textarea>
        <button onclick="window.copyPrompt()" style="margin-top:5px; background:var(--accent); color:black; border:none; padding:5px 10px; border-radius:4px; cursor:pointer; font-weight:bold;">Copier</button>
    </div>

    <div class="result-area" id="resultArea">
        <div class="result-placeholder">Zone de Rendu</div>
        <button class="btn-generate" onclick="window.generateImage()">Générer ✨</button>
    </div>


        <div id="historyContainer">
            <h4>Historique de session (Dernières 10 images)</h4>
            <div id="historyStrip">
                </div>
        </div>
    <button class="btn-menu" style="background:var(--accent); color:#000; font-weight:bold;" onclick="window.generateImage()">Générer ✨</button>

    <button onclick="window.checkModels()" style="background:#333; color:#888; border:none; padding:5px; font-size:10px; cursor:pointer;">Debug: Lister Modèles</button>
</div>

<div class="sidebar" id="sidebar">
    <div class="sidebar-header">Bibliothèque</div>

    <details id="refGallery" open>
        <summary style="border-left: 4px solid #ffcc00;">🖼️ RÉFÉRENCE VISUELLE</summary>
        <div class="details-content">
            <div id="selectedRefDisplay" style="margin-bottom:15px; text-align:center; display:none; background: rgba(0,212,255,0.05); border: 1px dashed var(--accent); padding: 10px; border-radius: 8px;">
                <p style="font-size:10px; color:var(--accent); margin-top:0; font-weight:bold;">Référence chargée :</p>
                <img id="refPreview" src="" style="width:100px; height:100px; object-fit:cover; border:2px solid var(--accent); border-radius:4px;">
                <p id="refName" style="font-size:9px; color:#888; margin: 5px 0; overflow:hidden;"></p>
                <button onclick="window.clearActiveReference()" style="background:#333; color:#ff4d4d; border:none; padding:4px 8px; border-radius:4px; font-size:10px; cursor:pointer;">[ Retirer ]</button>
            </div>

            <input type="file" id="localRefInput" style="display:none;" accept="image/*" onchange="window.handleLocalRef(this)">
            <button class="trigger-btn" onclick="document.getElementById('localRefInput').click()" style="border: 1px solid #444; margin-bottom:10px;">
                <strong>📤 Upload local</strong>
                <small>Image de ton PC</small>
            </button>
        </div>
    </details>

    <hr style="border:0; border-top:1px solid #222; margin:0;">

    <div class="sidebar-content" id="sidebarContent">
        <p style="text-align:center; padding:20px; color:#666;">Chargement...</p>
    </div>

    <div style="padding:10px; border-top:1px solid #222; margin-top:auto;">
        <button class="btn-generate" style="font-size:10px; opacity:0.5; width:100%; position:static;" onclick="window.debugListModels()">
            🐞 Lister Modèles (Debug)
        </button>
    </div>
</div>

<script type="module">
    let promptDb = {};
    let currentVariables = {};
    let lastRenderedVars = "";
    let currentReferenceBase64 = null; // Stocke l'image de référence

    // --- NOUVEAU : DB ET CONFIGURATION D'HISTORIQUE ---
    let historyDb = []; // Notre "garde-manger" en mémoire
    const MAX_HISTORY = 10; // Nombre max d'images à garder
    let activeHistoryIndex = -1; // Index de l'image affichée depuis l'historique

    const colorPalette = ['#00d4ff', '#ffcc00', '#bf80ff', '#00ffcc', '#ff9933', '#ff4d4d'];

    // --- PARSING YAML (Ligne par Ligne) ---
    async function loadYaml(fileName = 'default.yml') {
        const root = document.getElementById('sidebarContent');
        if (root) root.innerHTML = '<p style="text-align:center;color:#888;">Sync... 🔄</p>';
        try {
            const res = await fetch(`${fileName}?t=${new Date().getTime()}`);
            if (!res.ok) throw new Error(`Fichier introuvable (${res.status})`);
            const text = await res.text();
            parseYamlLineByLine(text);
        } catch (e) {
            root.innerHTML = `<p style="color:red;padding:10px;">❌ YAML Error</p>`;
        }
    }

    function parseYamlLineByLine(content) {
        const root = document.getElementById('sidebarContent');
        root.innerHTML = '';
        const lines = content.split('\n');
        
        let currentDetails = null, contentDiv = null, catIdx = 0;
        promptDb = {}; 

        lines.forEach((line, i) => {
            const trimmed = line.trim();
            if (trimmed.startsWith('###')) {
                currentDetails = document.createElement('details');
                const summary = document.createElement('summary');
                summary.textContent = trimmed.replace('###', '').trim();
                summary.style.borderLeft = `4px solid ${colorPalette[catIdx % 6]}`;
                contentDiv = document.createElement('div');
                contentDiv.className = 'details-content';
                currentDetails.append(summary, contentDiv);
                root.appendChild(currentDetails);
                catIdx++;
                return;
            }

            if (trimmed.startsWith('- trigger:')) {
                let lookAheadIndex = i + 1;
                let itemBlock = [line];
                while (lookAheadIndex < lines.length && 
                       !lines[lookAheadIndex].trim().startsWith('- trigger:') && 
                       !lines[lookAheadIndex].trim().startsWith('###')) {
                    itemBlock.push(lines[lookAheadIndex]);
                    lookAheadIndex++;
                }
                const segment = itemBlock.join('\n');
                const matchTR = segment.match(/trigger:\s*["']?(:[\w-]+)["']?\s*replace:\s*(?:["']?([\s\S]*?)["']?(?=\n|$)|\|([\s\S]*?)(?=\n|$))/);
                const matchImg = segment.match(/image:\s*["']?([\s\S]*?)["']?(?=\n|$)/);

                if (matchTR) {
                    const trig = matchTR[1];
                    const repl = (matchTR[2] || matchTR[3] || "").trim();
                    const imgPath = matchImg ? matchImg[1] : null;
                    promptDb[trig] = { text: repl, color: colorPalette[(catIdx-1)%6] || '#888', image: imgPath };
                    
                    const btn = document.createElement('button');
                    btn.className = 'trigger-btn';
                    
                    btn.innerHTML = imgPath ? `
                        <div style="display:flex; align-items:center;">
                            <img src="${imgPath}" style="width:35px;height:35px;object-fit:cover;border-radius:4px;margin-right:8px;border:1px solid #333;">
                            <div style="flex:1;text-align:left;">
                                <strong style="color:${promptDb[trig].color}">${trig}</strong>
                                <small style="display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:150px;">${repl}</small>
                            </div>
                        </div>` : `
                        <div style="text-align:left;">
                            <strong style="color:${promptDb[trig].color}">${trig}</strong>
                            <small style="display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px;">${repl}</small>
                        </div>`;
                    
                    btn.onclick = () => {
                        window.insertTag(trig);
                        if (imgPath) window.loadReferenceFromUrl(imgPath);
                    };
                    if (contentDiv) contentDiv.appendChild(btn);
                }
            }
        });
    }

    // --- GESTION DES RÉFÉRENCES VISUELLES (Stable) ---
    window.loadReferenceFromUrl = async (url) => {
        try {
            const res = await fetch(url);
            const blob = await res.blob();
            const reader = new FileReader();
            reader.onloadend = () => {
                currentReferenceBase64 = reader.result.split(',')[1];
                document.getElementById('refPreview').src = reader.result;
                document.getElementById('refName').textContent = url.split('/').pop();
                document.getElementById('selectedRefDisplay').style.display = 'block';
            };
            reader.readAsDataURL(blob);
        } catch (e) { console.error("Erreur image:", e); }
    };

    window.handleLocalRef = (input) => {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onloadend = () => {
                currentReferenceBase64 = reader.result.split(',')[1];
                document.getElementById('refPreview').src = reader.result;
                document.getElementById('refName').textContent = input.files[0].name;
                document.getElementById('selectedRefDisplay').style.display = 'block';
            };
            reader.readAsDataURL(input.files[0]);
        }
    };

    window.clearActiveReference = () => {
        currentReferenceBase64 = null;
        document.getElementById('selectedRefDisplay').style.display = 'none';
    };

    // --- LOGIQUE DE PROMPT (Couleurs & Variables) ---
    window.processPrompt = () => {
        const text = document.getElementById('promptResume').value;
        const layer = document.getElementById('highlightLayer');
        
        // Couleurs
        layer.innerHTML = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
            .replace(/(:\w[\w-]*)/g, m => promptDb[m] ? `<span style="background:${promptDb[m].color}40;color:${promptDb[m].color}">${m}</span>` : m)
            .replace(/\n/g, '<br>') + (text.endsWith('\n') ? ' ' : '');

        // Compilation (Texte)
        let full = text;
        (text.match(/(:\w[\w-]*)/g) || []).forEach(t => {
            if (promptDb[t]) full = full.replace(t, promptDb[t].text.replace(/\[Use.*?\]\s*/gi, '').trim());
        });

        // Compilation (Variables) -> Simple et robuste
        const vRegex = /{{(.*?)}}/g;
        let vFound = new Set(), m;
        while ((m = vRegex.exec(full)) !== null) vFound.add(m[1]);
        
        renderVars(vFound);
        
        let final = full;
        vFound.forEach(v => {
            final = final.replace(new RegExp(`{{${v}}}`, 'g'), currentVariables[v] || `[${v}]`);
        });
        document.getElementById('promptComplet').value = final;
    }

    function renderVars(vSet) {
        const sig = Array.from(vSet).sort().join(',');
        if (lastRenderedVars === sig) return;
        lastRenderedVars = sig;
        const cont = document.getElementById('variablesContainer');
        const list = document.getElementById('variablesList');
        if (vSet.size === 0) { cont.style.display = 'none'; return; }
        cont.style.display = 'flex';
        list.innerHTML = '';
        vSet.forEach(v => {
            if (currentVariables[v] === undefined) currentVariables[v] = '';
            const d = document.createElement('div');
            d.className = 'var-row';
            d.innerHTML = `<label>${v}</label><input type="text" value="${currentVariables[v]}" oninput="window.updateVar('${v}', this.value)">`;
            list.appendChild(d);
        });
    }

    window.updateVar = (n, v) => { currentVariables[n] = v; window.processPrompt(); };
    window.insertTag = (t) => {
        const a = document.getElementById('promptResume');
        a.value += (a.value.endsWith(' ') || a.value === '' ? '' : ' ') + t + ' ';
        window.processPrompt();
    };

    // --- NOUVEAU : FONCTIONS LOGIQUES D'HISTORIQUE ---
    function addToHistory(b64, mime, promptComplet, promptResume) {
        // Création de l'objet d'historique (Senior Style)
        const historyItem = {
            id: Date.now(),
            b64: b64,
            mime: mime,
            promptComplet: promptComplet,
            promptResume: promptResume,
            timeStamp: new Date().toLocaleTimeString()
        };
        
        // On l'ajoute au DÉBUT de l'array
        historyDb.unshift(historyItem);
        
        // On coupe si on dépasse la limite
        if (historyDb.length > MAX_HISTORY) historyDb.pop();
        
        // On réinitialise l'index actif car on vient d'ajouter une nouvelle image
        activeHistoryIndex = -1; 
        
        // On met à jour l'interface
        renderHistoryArea();
    }

    function renderHistoryArea() {
        const strip = document.getElementById('historyStrip');
        const container = document.getElementById('historyContainer');
        
        if (historyDb.length === 0) {
            container.style.display = 'none';
            return;
        }
        
        container.style.display = 'block';
        strip.innerHTML = ''; // Clear previous thumbs
        
        historyDb.forEach((item, index) => {
            const thumbWrapper = document.createElement('div');
            thumbWrapper.className = `history-thumb-wrapper ${index === activeHistoryIndex ? 'active' : ''}`;
            thumbWrapper.title = item.promptResume.substring(0, 100) + '...'; // Tooltip
            
            thumbWrapper.innerHTML = `
                <img src="data:${item.mime};base64,${item.b64}" class="history-thumb">
                <span class="history-number">#${historyDb.length - index}</span>
            `;
            
            thumbWrapper.onclick = () => window.loadHistoryImage(index);
            strip.appendChild(thumbWrapper);
        });
    }

    window.loadHistoryImage = (index) => {
        activeHistoryIndex = index;
        const item = historyDb[index];
        
        // On met à jour la zone de résultat principal
        const area = document.getElementById('resultArea');
        renderImageResult(area, item.b64, item.mime);
        
        // --- UX CRUCIAL : On recharge les prompts historiques ---
        // 1. On recharge le prompt complet pour la copie/lecture
        document.getElementById('promptComplet').value = item.promptComplet;
        
        // 2. On recharge le prompt résumé pour la modification/régénération
        const promptResumeField = document.getElementById('promptResume');
        promptResumeField.value = item.promptResume;
        
        // 3. On relance le processPrompt pour mettre à jour le HighlightLayer et les couleurs
        window.processPrompt();
        
        // On met à jour la galerie pour montrer quel thumb est actif
        renderHistoryArea();
        
        console.log(`Richard, j'ai rechargé l'image #${historyDb.length - index} de l'historique.`);
    }

    // --- API GÉNÉRATION (Version Blindée Multimodale) ---
    async function generateImage() {
        const key = document.getElementById('apiKey').value.trim();
        const promptRawResume = document.getElementById('promptResume').value; // NOUVEAU: On sauvegarde le résumé pour l'historique
        const promptRawComplet = document.getElementById('promptComplet').value.trim();
        const model = document.getElementById('modelSelect').value;
        const ratio = document.getElementById('aspectRatioSelect').value;
        const area = document.getElementById('resultArea');

        if (!key || !promptRawComplet) return alert("Besoin de la clé et du prompt !");
        
        area.innerHTML = `<div style="color:var(--accent);animation:pulse 1s infinite">Génération Imagen 4 en cours... ${currentReferenceBase64 ? '🖼️ Reference active' : ''}</div>`;

        try {
            // Imagen 4 utilise :predict, les autres :generateContent
            const isImagen = model.includes('imagen');
            const method = isImagen ? 'predict' : 'generateContent';
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:${method}?key=${key}`;

            let body;
            if (isImagen) {
                body = {
                    instances: [{ 
                        prompt: promptRawComplet,
                        image: currentReferenceBase64 ? { bytesBase64Encoded: currentReferenceBase64 } : undefined
                    }],
                    parameters: { sampleCount: 1, aspectRatio: ratio, outputMimeType: "image/jpeg" }
                };
            } else {
                // Format Gemini Multimodal
                const parts = [{ text: promptRawComplet }];
                if (currentReferenceBase64) parts.push({ inline_data: { mime_type: "image/png", data: currentReferenceBase64 } });
                body = { contents: [{ parts: parts }] };
            }

            const res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });

            const data = await res.json();
            if (!res.ok) throw new Error(data.error?.message || `Erreur HTTP ${res.status}`);

            // --- LA GRANDE CHASSE AUX PIXELS ---
            const b64 = data.predictions?.[0]?.bytesBase64Encoded || 
                        data.generatedImages?.[0]?.image?.imageBytes;

            if (b64) {
                // On récupère le mimeType du render (PNG vs JPEG)
                const mime = data.predictions?.[0]?.mimeType || "image/png";
                
                // --- NOUVEAU : AJOUT À L'HISTORIQUE ---
                addToHistory(b64, mime, promptRawComplet, promptRawResume);
                
                // On affiche dans la zone principale
                renderImageResult(area, b64, mime);
                
            } else {
                // Fallback texte si Gemini Flash (Nano) répond
                const txt = data.candidates?.[0]?.content?.parts?.[0]?.text || "Pas de pixels.";
                area.innerHTML = `<div style="color:#aaa; padding:20px; white-space:pre-wrap; text-align:left;">${txt}</div>`;
            }
        } catch (e) {
            console.error("Détails IT:", e);
            area.innerHTML = `<div style="color:#ff4d4d; padding:15px; background:#2b0000; border:1px solid #ff4d4d; border-radius:8px;">${e.message}</div>`;
        }
    }

    // Fonction utilitaire pour le rendu de l'image principale (pour le réutiliser)
    function renderImageResult(area, b64, mime) {
        area.innerHTML = `
            <div style="display:flex; flex-direction:column; align-items:center; height:100%; width:100%;">
                <img src="data:${mime};base64,${b64}" style="max-width:100%; max-height:85%; border-radius:8px; border:2px solid var(--accent); box-shadow: 0 0 25px rgba(0,212,255,0.4);">
                <div style="margin-top:10px; display:flex; gap:10px;">
                    <button class="btn-generate" onclick="window.generateImage()" style="position:static;">Regénérer ✨</button>
                    <button id="btnNewImage" onclick="window.newGeneration()" style="position:static; background:#444; color:white; padding:8px 12px; border-radius:4px; border:none; font-weight:bold; font-size:12px; cursor:pointer;">Nouvelle requête</button>
                    <a href="data:${mime};base64,${b64}" download="lotus-render.png" style="background:#333; color:white; padding:8px 12px; border-radius:4px; text-decoration:none; font-weight:bold; font-size:12px;">Sauvegarder 💾</a>
                </div>
            </div>`;
    }

    // --- UTILS & DEBUG ---
    window.newGeneration = () => {
        document.getElementById('resultArea').innerHTML = '<div style="color:#aaa;padding:20px;text-align:center;">Prêt pour une nouvelle requête...</div>';
        // On n'efface plus l'historique quand on fait "Nouveau"
        window.clearActiveReference(); 
        document.getElementById('promptResume').focus();
        activeHistoryIndex = -1; // Plus d'image active de l'historique
        renderHistoryArea(); // On refresh pour enlever le style active
    };

    window.debugListModels = async () => {
        const k = document.getElementById('apiKey').value;
        const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${k}`);
        const d = await r.json();
        console.table(d.models.map(m => ({ Nom: m.name, Methodes: m.supportedGenerationMethods.join(', ') })));
        alert("Liste envoyée dans la console F12 !");
    };

    window.onload = () => {
        loadYaml();
        const k = localStorage.getItem('gemini_api_key');
        if (k) document.getElementById('apiKey').value = k;
        document.getElementById('promptResume').addEventListener('input', window.processPrompt);
        // On initialise la galerie au démarrage (cachée)
        renderHistoryArea();
    };

    // Exports
    window.generateImage = generateImage;
    window.copyPrompt = () => {
        const c = document.getElementById('promptComplet');
        c.select(); document.execCommand('copy'); alert("Copié !");
    };
    window.toggleSidebar = () => document.getElementById('sidebar').classList.toggle('collapsed');
    window.saveApiKey = (v) => localStorage.setItem('gemini_api_key', v);
    window.manualLoad = () => loadYaml(document.getElementById('ymlPath').value);
</script>

</body>
</html>
