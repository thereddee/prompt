<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Lotus de Fer - Studio de Génération</title>
    <style>
        :root {
            --bg-main: #121212;
            --bg-panel: #1e1e1e;
            --border: #333;
            --accent: #00d4ff;
            --accent-hover: #00a3cc;
            --text: #e0e0e0;
            --tag-color: #ff4d4d;
        }

        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg-main); color: var(--text); margin: 0; height: 100vh; display: flex; overflow: hidden; }

        /* --- LAYOUT PRINCIPAL --- */
        .workspace { flex: 1; display: flex; flex-direction: column; padding: 20px; overflow-y: auto; gap: 20px; }
        .sidebar { width: 350px; background: var(--bg-panel); border-left: 1px solid var(--border); display: flex; flex-direction: column; transition: transform 0.3s ease, width 0.3s ease; }
        .sidebar.collapsed { width: 0; border: none; transform: translateX(100%); }

        /* --- HEADER & CONFIG (Gauche) --- */
        .top-bar { display: flex; gap: 15px; align-items: center; background: var(--bg-panel); padding: 15px; border-radius: 8px; border: 1px solid var(--border); }
        .input-group { display: flex; flex-direction: column; flex: 1; gap: 5px; }
        .input-group label { font-size: 0.85em; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
        .input-group input, .input-group select { background: #111; color: var(--text); border: 1px solid var(--border); padding: 8px; border-radius: 4px; font-family: monospace; }
        .btn-toggle-sidebar { background: var(--accent); color: #000; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }

        /* --- ÉDITEURS DE PROMPT --- */
        .section-title { color: var(--accent); margin: 0 0 10px 0; font-size: 1.1em; text-transform: uppercase; display: flex; justify-content: space-between; align-items: center; }
        
        /* Conteneur magique pour le highlight du résumé */
        .editor-container { position: relative; width: 100%; height: 120px; background: #111; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
        .highlight-layer, #promptResume { position: absolute; top: 0; left: 0; width: 100%; height: 100%; padding: 12px; font-family: monospace; font-size: 14px; line-height: 1.5; white-space: pre-wrap; word-wrap: break-word; }
        .highlight-layer { color: transparent; z-index: 1; pointer-events: none; }
        #promptResume { background: transparent; color: var(--text); border: none; z-index: 2; resize: none; outline: none; caret-color: white; }
        .tag-highlight { border-radius: 3px; padding: 0 2px; font-weight: bold; }

        #promptComplet { width: 100%; height: 150px; background: #0a0a0a; color: #aaa; border: 1px solid var(--border); padding: 12px; font-family: monospace; border-radius: 4px; resize: none; line-height: 1.4; }

        /* --- VARIABLES --- */
        #variablesContainer { display: flex; flex-direction: column; gap: 10px; background: #2a2510; border: 1px solid #665200; padding: 15px; border-radius: 4px; display: none; }
        .var-row { display: flex; align-items: center; gap: 10px; }
        .var-row label { font-family: monospace; color: #ffcc00; font-weight: bold; width: 120px; }
        .var-row input { flex: 1; background: #111; color: white; border: 1px solid #555; padding: 8px; border-radius: 4px; }

        /* --- RÉSULTAT (Image Placeholder) --- */
        .result-area { flex: 1; border: 2px dashed var(--border); border-radius: 8px; display: flex; justify-content: center; align-items: center; background: #0a0a0a; min-height: 200px; position: relative; }
        .result-placeholder { color: #555; font-size: 1.2em; text-transform: uppercase; letter-spacing: 2px; }
        .btn-generate { position: absolute; bottom: 20px; right: 20px; background: var(--tag-color); color: white; border: none; padding: 12px 24px; border-radius: 4px; font-weight: bold; font-size: 1.1em; cursor: pointer; box-shadow: 0 4px 10px rgba(255, 77, 77, 0.3); }

        /* --- SIDEBAR (Droite) --- */
        .sidebar-header { padding: 15px; background: #111; border-bottom: 1px solid var(--border); font-weight: bold; text-transform: uppercase; color: var(--accent); }
        .sidebar-content { flex: 1; overflow-y: auto; padding: 10px; }
        
        details { margin-bottom: 10px; background: #252525; border-radius: 4px; border: 1px solid var(--border); }
        details summary { padding: 12px; font-weight: bold; cursor: pointer; outline: none; user-select: none; color: #ddd; }
        details summary:hover { background: #2a2a2a; }
        .details-content { padding: 10px; display: flex; flex-direction: column; gap: 8px; }
        
        .trigger-btn { background: #1a1a1a; border: 1px solid #444; color: var(--text); padding: 10px; border-radius: 4px; text-align: left; cursor: pointer; font-family: monospace; transition: 0.2s; display: flex; flex-direction: column; gap: 4px; }
        .trigger-btn:hover { border-color: var(--accent); background: #222; }
        .trigger-btn strong { color: var(--accent); font-size: 1.1em; }
        .trigger-btn small { color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    </style>
</head>
<body>

<div class="workspace">
    
    <div class="top-bar">
        <div class="input-group">
            <label>Fichier YAML</label>
            <input type="text" id="ymlPath" value="default.yml" onchange="loadYaml()">
        </div>
        <div class="input-group">
            <label>Modèle IA</label>
            <select id="modelSelect">
                <option value="midjourney">Midjourney v6</option>
                <option value="dalle3">DALL-E 3</option>
                <option value="stable">Stable Diffusion XL</option>
            </select>
        </div>
        <div class="input-group">
            <label>Clé API (Temporaire)</label>
            <input type="password" id="apiKey" placeholder="sk-...">
        </div>
        <button class="btn-toggle-sidebar" onclick="toggleSidebar()">☰ Menu</button>
    </div>

    <div>
        <h3 class="section-title">Prompt Résumé</h3>
        <div class="editor-container">
            <div id="highlightLayer" class="highlight-layer"></div>
            <textarea id="promptResume" placeholder="Clique sur les tags à droite ou tape tes propres instructions ici..." oninput="processPrompt()"></textarea>
        </div>
    </div>

    <div id="variablesContainer">
        <h3 class="section-title" style="color: #ffcc00; margin: 0;">Paramètres Requis</h3>
        <div id="variablesList"></div>
    </div>

    <div>
        <h3 class="section-title">Prompt Complet (Généré)</h3>
        <textarea id="promptComplet" readonly placeholder="Le texte final traduit avec les variables s'affichera ici..."></textarea>
    </div>

    <div class="result-area">
        <div class="result-placeholder">Zone de Rendu Image</div>
        <button class="btn-generate" onclick="alert('Bientôt connecté à l\'API !')">Générer l'image ✨</button>
    </div>

</div>

<div class="sidebar" id="sidebar">
    <div class="sidebar-header">Bibliothèque de Prompts</div>
    <div class="sidebar-content" id="sidebarContent">
        <p style="color: #666; text-align: center; margin-top: 20px;">Chargement du YAML...</p>
    </div>
</div>

<script>
    let promptDb = {}; // Dictionnaire global : { ":trigger": "replace text" }
    let currentVariables = {}; // Stocke les valeurs tapées par l'utilisateur
    const colorPalette = ['#ff4d4d', '#00d4ff', '#ffcc00', '#bf80ff', '#00ffcc', '#ff9933']; // Couleurs pour les tags

    // --- CHARGEMENT DU FICHIER YML ---
    async function loadYaml() {
        const fileName = document.getElementById('ymlPath').value.trim();
        const sidebarContent = document.getElementById('sidebarContent');
        sidebarContent.innerHTML = '<p style="color: #888; text-align: center;">Sync en cours...</p>';
        promptDb = {};

        try {
            const response = await fetch(`${fileName}?t=${new Date().getTime()}`);
            if (!response.ok) throw new Error();
            const content = await response.text();
            parseAndBuildSidebar(content);
            processPrompt(); // Met à jour s'il y avait déjà du texte
        } catch (err) {
            sidebarContent.innerHTML = `<p style="color: #ff4d4d; padding: 15px;">Erreur: Impossible de lire ${fileName}. Assure-toi qu'il est dans le même dossier.</p>`;
        }
    }

    // --- PARSING ET CRÉATION DE LA SIDEBAR ---
    function parseAndBuildSidebar(content) {
        const root = document.getElementById('sidebarContent');
        root.innerHTML = '';
        const lines = content.split('\n');
        
        let currentDetails = null;
        let contentDiv = null;
        let categoryIndex = 0; // Pour assigner une couleur par catégorie

        const matchRegex = /^\s*-\s*trigger:\s*["']?(:[\w-]+)["']?\s*replace:\s*(?:["']?([\s\S]*?)["']?(?=\n\s*-|\n\s*vars:|\n\s*#|$)|\|([\s\S]*?)(?=\n\s*-|\n\s*vars:|\n\s*#|$))/;

        lines.forEach((line, index) => {
            // Création des catégories (Accordéons)
            if (line.trim().startsWith('###')) {
                const categoryName = line.replace('###', '').trim();
                
                currentDetails = document.createElement('details');
                currentDetails.open = true; // Ouvert par défaut
                
                const summary = document.createElement('summary');
                summary.textContent = categoryName;
                summary.style.borderLeft = `4px solid ${colorPalette[categoryIndex % colorPalette.length]}`;
                
                contentDiv = document.createElement('div');
                contentDiv.className = 'details-content';

                currentDetails.appendChild(summary);
                currentDetails.appendChild(contentDiv);
                root.appendChild(currentDetails);
                
                categoryIndex++;
                return;
            }

            // Fallback s'il n'y a pas de catégorie au début du fichier
            if (!currentDetails) {
                currentDetails = document.createElement('details');
                currentDetails.open = true;
                const summary = document.createElement('summary');
                summary.textContent = "Général";
                contentDiv = document.createElement('div');
                contentDiv.className = 'details-content';
                currentDetails.appendChild(summary);
                currentDetails.appendChild(contentDiv);
                root.appendChild(currentDetails);
            }

            // Extraction des triggers
            const segment = lines.slice(index, index + 10).join('\n');
            const match = segment.match(matchRegex);

            if (match && line.trim().startsWith('- trigger:')) {
                const trigger = match[1];
                let replace = (match[2] || match[3] || "").trim().replace(/\s+/g, ' ');
                
                if ([':espanso', ':txt', ':date', ':shell'].includes(trigger)) return;

                // Sauvegarde dans la base de données JS
                promptDb[trigger] = { text: replace, color: colorPalette[(categoryIndex - 1) % colorPalette.length] };

                // Création du bouton
                const btn = document.createElement('button');
                btn.className = 'trigger-btn';
                btn.innerHTML = `<strong style="color: ${promptDb[trigger].color}">${trigger}</strong><small>${replace}</small>`;
                btn.onclick = () => insertTag(trigger);
                
                contentDiv.appendChild(btn);
            }
        });
    }

    // --- GESTION DE L'ÉDITEUR ---
    function insertTag(trigger) {
        const textarea = document.getElementById('promptResume');
        // Ajoute le tag avec un espace
        textarea.value = textarea.value + (textarea.value.endsWith(' ') || textarea.value === '' ? '' : ' ') + trigger + ' ';
        textarea.focus();
        processPrompt();
    }

    function processPrompt() {
        const textarea = document.getElementById('promptResume');
        const highlightLayer = document.getElementById('highlightLayer');
        const rawText = textarea.value;

        // 1. Mise à jour de la surbrillance visuelle (Highlighting)
        // On remplace le texte pour le layer arrière. Les tags reconnus deviennent colorés.
        let highlightedHTML = rawText
            .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;') // Échapper le HTML
            .replace(/(:\w[\w-]*)/g, (match) => {
                if (promptDb[match]) {
                    // Appliquer la couleur de la catégorie
                    return `<span class="tag-highlight" style="background-color: ${promptDb[match].color}40; color: ${promptDb[match].color};">${match}</span>`;
                }
                return match;
            });
        
        // Pour que les retours à la ligne soient bien calqués
        highlightLayer.innerHTML = highlightedHTML.replace(/\n/g, '<br>') + '<br>';

        // 2. Traduction pour le "Prompt Complet"
        let fullPrompt = rawText;
        const foundTags = rawText.match(/(:\w[\w-]*)/g) || [];
        
        foundTags.forEach(tag => {
            if (promptDb[tag]) {
                // Nettoyage des balises [Use ...] s'il y en a
                let cleanReplace = promptDb[tag].text.replace(/\[Use.*?\]\s*/gi, '').trim();
                fullPrompt = fullPrompt.replace(tag, cleanReplace);
            }
        });

        // 3. Gestion des variables {{...}}
        extractAndRenderVariables(fullPrompt);
        
        // Applique les valeurs actuelles des variables au texte final
        let finalOutput = fullPrompt;
        Object.keys(currentVariables).forEach(varName => {
            const val = currentVariables[varName] || `[${varName}]`;
            finalOutput = finalOutput.replace(new RegExp(`{{${varName}}}`, 'g'), val);
        });

        document.getElementById('promptComplet').value = finalOutput;
    }

    // --- GESTION DES VARIABLES ---
    function extractAndRenderVariables(text) {
        const regex = /{{(.*?)}}/g;
        let varsFound = new Set();
        let match;
        
        while ((match = regex.exec(text)) !== null) {
            varsFound.add(match[1]);
        }

        const container = document.getElementById('variablesContainer');
        const listDiv = document.getElementById('variablesList');
        
        if (varsFound.size === 0) {
            container.style.display = 'none';
            return;
        }

        container.style.display = 'flex';
        listDiv.innerHTML = ''; // Reset

        varsFound.forEach(varName => {
            const row = document.createElement('div');
            row.className = 'var-row';
            
            // Si la variable n'existe pas encore dans notre state, on la crée
            if (currentVariables[varName] === undefined) {
                currentVariables[varName] = '';
            }

            row.innerHTML = `
                <label>${varName}</label>
                <input type="text" placeholder="Entrez la valeur..." value="${currentVariables[varName]}" oninput="updateVar('${varName}', this.value)">
            `;
            listDiv.appendChild(row);
        });
    }

    function updateVar(name, value) {
        currentVariables[name] = value;
        processPrompt(); // Retraduit le prompt complet en temps réel
    }

    // --- UI UTILS ---
    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        sidebar.classList.toggle('collapsed');
    }

    // Pour synchroniser le scroll de la zone de texte et du highlight
    document.getElementById('promptResume').addEventListener('scroll', function() {
        document.getElementById('highlightLayer').scrollTop = this.scrollTop;
    });

    // Initialisation
    window.onload = loadYaml;

</script>
</body>
</html>
